<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自信 - 关于</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", SimSun, sans-serif;
        }
        body {
            color: #000;
            background: #fff;
            padding: 24px;
            line-height: 1.7;
        }
        .site-title {
            font-size: 24px;
            margin-bottom: 16px;
            font-weight: normal;
        }
        .header {
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #ccc;
        }
        .header a {
            color: #000;
            text-decoration: none;
            margin-right: 16px;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .current-text {
            margin-right: 16px;
            color: #666;
        }
        .about-box {
            max-width: 800px;
        }
        .about-box h2 {
            font-size: 20px;
            margin-bottom: 16px;
            font-weight: normal;
        }
        .about-box p {
            margin-bottom: 12px;
            font-size: 15px;
        }
        .about-box hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #ccc;
        }
        .about-list {
            padding-left: 20px;
            margin-bottom: 12px;
        }
        .img-wrap {
            margin: 16px 0;
            text-align: center;
        }
        .img-tip {
            font-size: 16px;
            margin: 8px 0;
            color: #222;
            text-align: center;
        }
        /* 优化图片样式 */
        .img-wrap img {
            max-width: 350px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.25s ease;
            user-select: none;
            pointer-events: auto;
        }
        .img-wrap img:hover {
            transform: scale(1.02);
        }
        .img-wrap img:not([src]),
        .img-wrap img[src=""] {
            padding: 20px;
            border: 1px dashed #999;
        }
        .copyright {
            margin-top: 40px;
            padding-top: 12px;
            border-top: 1px solid #ccc;
            font-size: 13px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1 class="site-title">自信</h1>
    <div class="header">
        <a href="index.html">首页</a>
        <span class="current-text">关于</span>
    </div>

    <div class="about-box">
        <h2>关于本站</h2>
        <p>一些帮助可以下载自己下载不到的软件，这就是我的知足点</p>
        <p>人就要折腾，才能有力气，所以这个网站我也会更新的😁</p>

        <hr>

        <h2>功能说明</h2>
        <ul class="about-list">
            <li>附件页面支持本地前端搜索，输入文件名可实时过滤表格数据</li>
            <li>原生标准表格展示文件，无分页，全部数据一次性加载</li>
            <li>纯文字蓝色下载链接，无花哨按钮与卡片样式</li>
            <li>全站统一极简黑白配色，适配电脑、手机浏览</li>
        </ul>

        <hr>

        <h2>联系方式</h2>
        <p>x522222@outlook.com</p>
        <p>ovo1321@outlook.com</p>

        <hr>
        
        <p class="img-tip">工作室</p>
        <div class="img-wrap">
            <img src="10.png" alt="联系二维码" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='图片加载失败，请稍后重试'">
        </div>

        <hr>
        
        <p class="img-tip">最大贡献</p>
        <div class="img-wrap">
            <img src="11.png" alt="Github地址二维码" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='图片加载失败，请稍后重试'">
        </div>

    </div>

    <div class="copyright">
        © 2026 自信
    </div>
</body>
</html>
